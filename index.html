<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Fletcher Files</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1510;
      --bg2:      #211c15;
      --bg3:      #2a2318;
      --paper:    #f5edd8;
      --paper2:   #ede0c4;
      --amber:    #c9922a;
      --amber2:   #e8b040;
      --text:     #f0e4cc;
      --text2:    #c8b898;
      --text3:    #8a7a60;
      --border:   #3d3020;
      --border2:  #c9922a55;
      --red:      #8b2020;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    }

    #root {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    /* ── HEADER ── */
    .header {
      padding: 2.5rem 0 0;
      margin-bottom: 2rem;
      position: relative;
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 3px double var(--amber);
    }
    .logo-badge {
      position: relative;
      flex-shrink: 0;
    }
    .logo-badge img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: sepia(.6) contrast(1.1);
      animation: tigerBreath 4s ease-in-out infinite;
    }
    .logo-badge::after {
      content: '';
      position: absolute;
      inset: -4px;
      border: 2px solid var(--amber);
      border-radius: 50%;
      opacity: 0;
      animation: eyeGlow 4s ease-in-out infinite;
    }
    @keyframes tigerBreath {
      0%, 100% { transform: scale(1);    filter: sepia(.6) contrast(1.1); }
      50%       { transform: scale(1.03); filter: sepia(.3) contrast(1.2) drop-shadow(0 0 8px #c9922a88); }
    }
    @keyframes eyeGlow {
      0%, 40%, 100% { opacity: 0; transform: scale(1); }
      60%, 80%      { opacity: 1; transform: scale(1.05); }
    }
    .header-text { flex: 1; }
    .case-label {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 4px;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .subtitle {
      font-family: 'Crimson Text', serif;
      font-size: 16px;
      font-style: italic;
      color: var(--text2);
    }
    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 0;
    }
    .stamp {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--text3);
      text-transform: uppercase;
    }
    .ledger-btn {
      font-family: 'Special Elite', serif;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 5px 12px;
      background: transparent;
      color: var(--text3);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: all .2s;
    }
    .ledger-btn:hover, .ledger-btn.active { color: var(--amber); border-color: var(--amber); background: var(--bg2); }

    /* ── DECO DIVIDER ── */
    .deco {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0;
      color: var(--amber);
      font-size: 13px;
      letter-spacing: .2em;
    }
    .deco::before, .deco::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--amber), transparent); }

    /* ── ANALYTICS ── */
    .analytics-panel {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-top: 3px solid var(--amber);
      padding: 16px;
      margin-bottom: 20px;
      font-family: 'Special Elite', serif;
    }
    .analytics-title { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--amber); margin-bottom: 12px; }
    .analytics-stats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 60px; background: var(--bg3); border: 1px solid var(--border); padding: 10px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--amber2); font-family: 'Playfair Display', serif; }
    .stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }
    .analytics-cols { display: flex; gap: 16px; flex-wrap: wrap; }
    .analytics-col { flex: 1; min-width: 160px; }
    .analytics-col-title { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .analytics-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px dotted var(--border); color: var(--text2); font-family: 'Crimson Text', serif; }
    .analytics-row span:last-child { color: var(--amber); font-weight: 600; flex-shrink: 0; margin-left: 8px; }
    .analytics-empty { font-size: 13px; color: var(--text3); font-style: italic; font-family: 'Crimson Text', serif; }

    /* ── CASE FILES (PROFILES) ── */
    .section-label {
      font-family: 'Special Elite', serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .profile-bar { margin-bottom: 20px; }
    .profile-pills { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill {
      padding: 5px 14px;
      font-size: 12px;
      font-family: 'Special Elite', serif;
      letter-spacing: .05em;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      transition: all .2s;
      border-radius: 2px;
    }
    .pill:hover { border-color: var(--amber); color: var(--text); }
    .pill.active { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 700; }
    .pill.active-left { border-radius: 2px 0 0 2px; background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 700; border-right: none; }
    .pill-edit { padding: 5px 9px; border-radius: 0 2px 2px 0; background: var(--bg2); border: 1px solid var(--amber); border-left: none; color: var(--amber); cursor: pointer; font-size: 12px; transition: all .2s; }
    .pill-add { padding: 5px 12px; font-size: 14px; border: 1px dashed var(--border); background: transparent; color: var(--text3); cursor: pointer; line-height: 1; transition: all .2s; border-radius: 2px; }
    .pill-add:hover { border-color: var(--amber); color: var(--amber); }
    .profile-note { margin-top: 8px; font-size: 14px; color: var(--text3); font-style: italic; font-family: 'Crimson Text', serif; }

    /* ── EDITOR ── */
    .editor { background: var(--bg2); border: 1px solid var(--border2); border-top: 3px solid var(--amber); padding: 16px; margin-bottom: 20px; }
    .editor-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-family: 'Special Elite', serif; font-size: 9px; text-transform: uppercase; letter-spacing: .15em; color: var(--text3); }
    .field-input {
      padding: 8px 11px; font-size: 14px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: 'Crimson Text', serif;
      outline: none; transition: border-color .2s; border-radius: 2px;
    }
    .field-input:focus { border-color: var(--amber); }
    .field-input::placeholder { color: var(--text3); }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 2px; }
    .tab {
      padding: 8px 20px; font-size: 11px;
      font-family: 'Special Elite', serif;
      letter-spacing: .12em; text-transform: uppercase;
      background: var(--bg2); border: 1px solid var(--border);
      border-bottom: none; cursor: pointer;
      color: var(--text3); transition: all .2s;
      margin-bottom: -2px;
    }
    .tab:hover { color: var(--text2); background: var(--bg3); }
    .tab.active { background: var(--bg); color: var(--amber2); border-color: var(--amber); border-bottom: 2px solid var(--bg); }

    /* ── INPUTS ── */
    .input-wrap { margin-bottom: 16px; }
    .main-input {
      width: 100%; padding: 12px 14px; font-size: 15px;
      background: var(--bg2); border: 1px solid var(--border);
      border-bottom: 2px solid var(--border);
      color: var(--text); font-family: 'Crimson Text', serif;
      outline: none; transition: border-color .2s; border-radius: 2px;
    }
    .main-input:focus { border-color: var(--amber); }
    .main-input::placeholder { color: var(--text3); font-style: italic; }
    .main-textarea {
      width: 100%; padding: 12px 14px; font-size: 15px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: 'Crimson Text', serif;
      outline: none; resize: vertical; line-height: 1.7; border-radius: 2px;
      transition: border-color .2s;
    }
    .main-textarea:focus { border-color: var(--amber); }
    .main-textarea::placeholder { color: var(--text3); font-style: italic; }

    /* ── DROPDOWN ── */
    .dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
      background: var(--bg2); border: 1px solid var(--amber);
      margin-top: 2px; box-shadow: 4px 4px 0 rgba(0,0,0,.4); overflow: hidden;
    }
    .dropdown-item {
      padding: 10px 14px; font-size: 14px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px dotted var(--border); transition: background .15s;
      font-family: 'Crimson Text', serif;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--bg3); }
    .dropdown-title { color: var(--text); font-weight: 600; }
    .dropdown-author { color: var(--text3); font-size: 13px; margin-left: 8px; flex-shrink: 0; font-style: italic; }

    /* ── TROPES ── */
    .trope-section { margin-bottom: 14px; }
    .trope-cat { font-family: 'Special Elite', serif; font-size: 10px; text-transform: uppercase; letter-spacing: .15em; color: var(--text3); margin-bottom: 8px; }
    .trope-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .trope-chip {
      padding: 5px 12px; font-size: 12px; font-family: 'Special Elite', serif;
      letter-spacing: .04em; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text3); transition: all .2s; border-radius: 2px;
    }
    .trope-chip:hover { border-color: var(--amber); color: var(--text2); }
    .trope-chip.selected { background: var(--bg3); border-color: var(--text3); color: var(--text); }
    .trope-chip.priority { background: var(--amber); border-color: var(--amber2); color: var(--bg); font-weight: 700; }
    .trope-hint { font-size: 14px; color: var(--text3); font-style: italic; margin-bottom: 12px; font-family: 'Crimson Text', serif; }

    /* ── CHIPS ── */
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .chip { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); font-size: 12px; color: var(--text2); font-family: 'Crimson Text', serif; border-radius: 2px; }
    .chip-remove { background: none; border: none; cursor: pointer; color: var(--text3); padding: 0; font-size: 16px; line-height: 1; }
    .chip-remove:hover { color: var(--amber); }
    .chip.gold { border-color: var(--amber); color: var(--amber2); background: var(--bg2); }

    /* ── LIKED BANNER ── */
    .liked-banner { margin-bottom: 16px; padding: 10px 14px; background: var(--bg2); border-left: 3px solid var(--amber); font-size: 14px; font-family: 'Crimson Text', serif; }
    .liked-banner strong { color: var(--amber2); }
    .liked-banner span { color: var(--text2); }

    /* ── OPEN CASE BUTTON ── */
    .ask-btn {
      position: relative; width: 100%; padding: 15px;
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      background: var(--amber); color: var(--bg);
      border: none; cursor: pointer;
      transition: all .2s;
      box-shadow: 4px 4px 0 rgba(0,0,0,.4);
      margin-bottom: 28px; overflow: hidden;
    }
    .ask-btn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      transition: left .5s;
    }
    .ask-btn:hover::before { left: 100%; }
    .ask-btn:hover { background: var(--amber2); box-shadow: 6px 6px 0 rgba(0,0,0,.5); transform: translate(-1px,-1px); }
    .ask-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,.4); }
    .ask-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── RESULTS ── */
    .results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .results-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; font-style: italic; color: var(--amber2); white-space: nowrap; }
    .results-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--amber), transparent); }
    .results-count { font-family: 'Special Elite', serif; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }

    /* ── RESULT CARD (tome style) ── */
    .result-card {
      position: relative;
      padding: 16px;
      margin-bottom: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--amber);
      box-shadow: 3px 3px 0 rgba(0,0,0,.3);
      animation: fadeUp .4s ease both;
    }
    .result-card::before {
      content: attr(data-num);
      position: absolute; top: -1px; right: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 11px; font-style: italic;
      color: var(--bg); background: var(--amber);
      padding: 1px 8px; letter-spacing: .05em;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .result-inner { display: flex; gap: 14px; }
    .cover {
      width: 60px; height: 86px; flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; object-fit: cover;
      transition: transform .2s, box-shadow .2s;
      cursor: default;
    }
    .cover:hover { transform: scale(1.06); box-shadow: 3px 3px 12px rgba(201,146,42,.3); }
    .result-body { flex: 1; min-width: 0; }
    .result-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .result-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: var(--text); line-height: 1.2; }
    .heart-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 0; flex-shrink: 0; line-height: 1; transition: transform .2s; }
    .heart-btn:hover { transform: scale(1.2); }
    .result-meta { font-size: 13px; color: var(--text3); margin-bottom: 8px; font-family: 'Special Elite', serif; letter-spacing: .03em; }
    .result-series { font-style: normal; margin-left: 6px; color: var(--amber); }

    /* Typewriter reason */
    .result-reason {
      font-family: 'Special Elite', serif;
      font-size: 14px; color: var(--text2);
      line-height: 1.7; border-left: 2px solid var(--amber);
      padding-left: 10px; letter-spacing: .02em;
    }
    .cursor { display: inline-block; width: 2px; height: 14px; background: var(--amber); margin-left: 1px; animation: blink .7s step-end infinite; vertical-align: middle; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .note-field {
      width: 100%; margin-top: 12px; padding: 7px 10px; font-size: 13px;
      background: var(--bg3); border: 1px dashed var(--border);
      color: var(--text2); resize: none;
      font-family: 'Special Elite', serif; outline: none; line-height: 1.6;
      letter-spacing: .02em; transition: border-color .2s; border-radius: 2px;
    }
    .note-field:focus { border-color: var(--amber); }
    .note-field::placeholder { color: var(--text3); }

    /* ── MORE BUTTON ── */
    .more-btn {
      display: block; margin: 20px auto 0; padding: 10px 28px;
      font-family: 'Special Elite', serif; font-size: 12px;
      letter-spacing: .1em; text-transform: uppercase;
      background: transparent; color: var(--amber);
      border: 1px solid var(--amber); cursor: pointer;
      transition: all .2s; border-radius: 2px;
    }
    .more-btn:hover { background: var(--amber); color: var(--bg); box-shadow: 3px 3px 0 rgba(0,0,0,.3); }
    .more-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── TYPEWRITER LOADING ── */
    .typewriter-loading {
      padding: 2.5rem 0 2rem;
      text-align: center;
      margin-bottom: 28px;
    }
    .tw-paper {
      display: inline-block;
      background: var(--paper);
      border: 1px solid var(--paper2);
      box-shadow: 4px 4px 0 rgba(0,0,0,.4), inset 0 0 20px rgba(0,0,0,.05);
      padding: 24px 32px;
      max-width: 420px;
      width: 100%;
      position: relative;
    }
    .tw-paper::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: repeating-linear-gradient(90deg, var(--bg3) 0px, var(--bg3) 8px, transparent 8px, transparent 12px);
    }
    .tw-lines {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 14px;
    }
    .tw-line {
      height: 2px;
      background: #c8b898;
      border-radius: 1px;
      animation: twLine 2s ease-in-out infinite;
    }
    .tw-line:nth-child(1) { width: 80%; animation-delay: 0s; }
    .tw-line:nth-child(2) { width: 95%; animation-delay: .15s; }
    .tw-line:nth-child(3) { width: 70%; animation-delay: .3s; }
    .tw-line:nth-child(4) { width: 88%; animation-delay: .45s; }
    @keyframes twLine {
      0%,100% { opacity: .3; } 50% { opacity: .8; }
    }
    .tw-text {
      font-family: 'Special Elite', serif;
      font-size: 13px; letter-spacing: .1em;
      color: var(--bg3); text-transform: uppercase;
      border-top: 1px solid var(--paper2); padding-top: 12px;
      animation: twTextFade 1.5s ease-in-out infinite;
    }
    @keyframes twTextFade { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── MISC ── */
    .error-msg { font-size: 14px; color: #e07070; font-style: italic; margin-bottom: 14px; font-family: 'Crimson Text', serif; }
    .empty-msg { font-size: 17px; color: var(--text3); font-style: italic; font-family: 'Playfair Display', serif; text-align: center; padding: 2rem 0; }
    .ornament { text-align: center; color: var(--amber); font-size: 14px; margin: 8px 0 22px; letter-spacing: .4em; font-family: 'Playfair Display', serif; }
    .btn-primary { padding: 8px 16px; font-size: 13px; background: var(--amber); color: var(--bg); border: none; cursor: pointer; font-family: 'Special Elite', serif; letter-spacing: .05em; box-shadow: 2px 2px 0 rgba(0,0,0,.3); border-radius: 2px; }
    .btn-primary:hover { background: var(--amber2); }
    .btn-secondary { padding: 8px 14px; font-size: 13px; background: transparent; color: var(--text2); border: 1px solid var(--border); cursor: pointer; font-family: 'Special Elite', serif; border-radius: 2px; }
    .btn-danger { padding: 8px 14px; font-size: 13px; background: transparent; color: #e07070; border: 1px solid #8b404044; cursor: pointer; font-family: 'Special Elite', serif; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const WORKER_URL="https://anthropic-proxy.roman-carlos09.workers.dev";
const CSV_FILE="books_fiction.csv";
const LOGO_FILE="logo.png";

const TROPES=[
  {id:"enemies_to_lovers",label:"Enemies to Lovers",cat:"Romance"},
  {id:"slow_burn",label:"Slow Burn",cat:"Romance"},
  {id:"love_triangle",label:"Love Triangle",cat:"Romance"},
  {id:"forbidden_love",label:"Forbidden Love",cat:"Romance"},
  {id:"fake_dating",label:"Fake Dating",cat:"Romance"},
  {id:"second_chance_romance",label:"Second Chance Romance",cat:"Romance"},
  {id:"fast_paced",label:"Fast-Paced",cat:"Plot"},
  {id:"action_and_fighting",label:"Action & Fighting",cat:"Plot"},
  {id:"murder_mystery",label:"Murder Mystery",cat:"Plot"},

const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

function getCandidates(books,kws,priorityKws=[],likedKws=[],n=70,excl=null,alreadyRead=new Set(),shown=new Set(),doShuffle=false){
  const kSet=new Set(kws),pSet=new Set(priorityKws),lSet=new Set(likedKws);
  let pool=books.filter(b=>b.title!==excl&&!alreadyRead.has(b.title)&&!shown.has(b.title));
  let scored=pool.map(b=>{
    const toks=new Set(tokenize(`${b.title} ${b.subjects} ${b.summary}`));
    return{...b,_s:[...kSet].filter(k=>toks.has(k)).length+[...pSet].filter(k=>toks.has(k)).length*3+[...lSet].filter(k=>toks.has(k)).length*2};
  }).filter(b=>b._s>0);
  if(!scored.length) scored=pool;
  scored=doShuffle?shuffle(scored):scored.sort((a,b)=>b._s-a._s);
  return scored.slice(0,n);
}

async function callClaude(candidates,ctx,excluded=[],priorityLabel=null,likedTitles=[]){
  const exclNote=excluded.length?`\n\nDo NOT recommend: ${excluded.join(", ")}`:"";
  const prioNote=priorityLabel?`\n\nMust-have: "${priorityLabel}" — every pick MUST feature this.`:"";
  const likedNote=likedTitles.length?`\n\nThis student loved: ${likedTitles.join(", ")}. Weight toward similar feel.`:"";
  const list=candidates.map((b,i)=>`${i+1}. "${b.title}" by ${b.author}\n   ${(b.summary||"").slice(0,200)}`).join("\n\n");
  const res=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
      system:"You are a school librarian recommending middle school and YA fiction. Return only valid JSON arrays, no markdown.",
      messages:[{role:"user",content:`${ctx}${prioNote}${likedNote}${exclNote}\n\nChoose 6 best matches:\n\n${list}\n\nReturn ONLY: [{"title":"...","author":"...","reason":"1-2 sentence explanation"}]`}]})});
  const data=await res.json();
  return JSON.parse((data.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
}

function App(){
  const[books,setBooks]=React.useState([]);
  const[bookCount,setBookCount]=React.useState(0);
  const[loadError,setLoadError]=React.useState(false);
  const[profiles,setProfiles]=React.useState(()=>lsLoad("profiles",[]));
  const[activeProfileId,setActiveProfileId]=React.useState(null);
  const[editing,setEditing]=React.useState(null);
  const[showAnalytics,setShowAnalytics]=React.useState(false);
  const[analytics,setAnalytics]=React.useState(()=>lsLoad("analytics",DEFAULT_ANALYTICS));
  const[mode,setMode]=React.useState("similar");
  const[query,setQuery]=React.useState("");
  const[selTropes,setSelTropes]=React.useState(new Set());
  const[priorityTrope,setPriorityTrope]=React.useState(null);
  const[alreadyRead,setAlreadyRead]=React.useState(new Set());
  const[results,setResults]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[loadingMore,setLoadingMore]=React.useState(false);
  const[error,setError]=React.useState("");
  const[suggestions,setSuggestions]=React.useState([]);
  const[refBook,setRefBook]=React.useState(null);
  const[shownTitles,setShownTitles]=React.useState(new Set());
  const lastSearch=React.useRef(null);

  React.useEffect(()=>{
    fetch(CSV_FILE).then(r=>{if(!r.ok)throw new Error();return r.text();})
      .then(text=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:r=>{setBooks(r.data);setBookCount(r.data.length);}});})
      .catch(()=>setLoadError(true));
  },[]);

  const saveProfiles=p=>{setProfiles(p);lsSave("profiles",p);};
  const saveAnalytics=a=>{setAnalytics(a);lsSave("analytics",a);};
  const activeProfile=profiles.find(p=>p.id===activeProfileId)||null;

  const selectProfile=id=>{
    setActiveProfileId(id);setEditing(null);setResults(null);setShownTitles(new Set());lastSearch.current=null;
    setAlreadyRead(id?new Set(profiles.find(p=>p.id===id)?.alreadyRead||[]):new Set());
  };

  const toggleHeart=title=>{
    if(!activeProfile) return;
    const liked=activeProfile.likedBooks||[];
    const updated=liked.includes(title)?liked.filter(t=>t!==title):[...liked,title];
    saveProfiles(profiles.map(p=>p.id===activeProfileId?{...p,likedBooks:updated}:p));
  };

  const trackSearch=(m,tropes=[])=>{
    const a={...analytics,totalSearches:(analytics.totalSearches||0)+1,searchModes:{...analytics.searchModes,[m]:(analytics.searchModes[m]||0)+1},tropeSearches:{...analytics.tropeSearches}};
    tropes.forEach(t=>{a.tropeSearches[t]=(a.tropeSearches[t]||0)+1;});
    saveAnalytics(a);
  };

  const trackRecs=recs=>{
    const a={...analytics,recommendedBooks:{...analytics.recommendedBooks}};
    recs.forEach(b=>{a.recommendedBooks[b.title]=(a.recommendedBooks[b.title]||0)+1;});
    saveAnalytics(a);
  };

  const onQueryChange=val=>{
    setQuery(val);setRefBook(null);
    if(mode==="similar"&&val.length>1) setSuggestions(books.filter(b=>(b.title||"").toLowerCase().includes(val.toLowerCase())).slice(0,7));
    else setSuggestions([]);
  };

  const toggleTrope=id=>{
    setSelTropes(prev=>{
      const n=new Set(prev);
      if(!n.has(id)){n.add(id);}
      else if(priorityTrope!==id){setPriorityTrope(id);}
      else{n.delete(id);setPriorityTrope(null);}
      return n;
    });
  };

  const switchMode=m=>{setMode(m);setResults(null);setError("");setQuery("");setRefBook(null);setSuggestions([]);setSelTropes(new Set());setPriorityTrope(null);setShownTitles(new Set());lastSearch.current=null;};

  const getLikedKws=()=>{
    if(!activeProfile?.likedBooks?.length) return[];
    return tokenize(books.filter(b=>activeProfile.likedBooks.includes(b.title)).map(b=>`${b.subjects} ${b.summary}`).join(" "));
  };

  const buildParams=()=>{
    let kws=[],priorityKws=[],ctx="",excl=null,priorityLabel=null;
    if(mode==="similar"){
      const ref=refBook||books.find(b=>(b.title||"").toLowerCase()===query.toLowerCase());
      if(!ref) return null;
      kws=tokenize(`${ref.subjects} ${ref.summary}`);excl=ref.title;
      ctx=`A student loved "${ref.title}" by ${ref.author}.\n\nSummary: ${ref.summary}\n\nFind books with similar themes, characters, tone, and plot elements.`;
    } else if(mode==="tropes"){
      if(!selTropes.size) return null;
      const labels=TROPES.filter(t=>selTropes.has(t.id)).map(t=>t.label);
      kws=[...new Set(labels.flatMap(l=>{const id=TROPES.find(t=>t.label===l)?.id;return[...tokenize(l),...(TROPE_KEYWORDS[id]||[])];}))];
      if(priorityTrope){priorityKws=[...tokenize(TROPES.find(t=>t.id===priorityTrope)?.label||""),...(TROPE_KEYWORDS[priorityTrope]||[])];priorityLabel=TROPES.find(t=>t.id===priorityTrope)?.label;}
      ctx=`A student wants books with: ${labels.join(", ")}. Find the best matches.`;
    } else {
      if(!query.trim()) return null;
      kws=tokenize(query);
      ctx=`A student wants: "${query}". Find the best matches.`;
    }
    return{kws,priorityKws,ctx,excl,priorityLabel};
  };

  const runSearch=async(params,shown,doShuffle=false,isMore=false)=>{
    const{kws,priorityKws,ctx,excl,priorityLabel}=params;
    const cands=getCandidates(books,kws,priorityKws,getLikedKws(),70,excl,alreadyRead,shown,doShuffle);
    const recs=await callClaude(cands,ctx,[...alreadyRead,...shown],priorityLabel,activeProfile?.likedBooks||[]);
    const enriched=recs.map(r=>({...(books.find(b=>b.title===r.title&&b.author===r.author)||books.find(b=>b.title===r.title)||r),...r}));
    setShownTitles(new Set([...shown,...enriched.map(b=>b.title)]));
    isMore?setResults(prev=>[...(prev||[]),...enriched]):setResults(enriched);
    trackRecs(enriched);
  };

  const search=async()=>{
    setError("");setResults(null);setLoading(true);setShownTitles(new Set());lastSearch.current=null;
    try{
      const params=buildParams();
      if(!params){setError(mode==="similar"?"Select a title from the suggestions.":mode==="tropes"?"Select at least one trope.":"Describe what you're looking for.");setLoading(false);return;}
      lastSearch.current=params;
      await runSearch(params,new Set());
      trackSearch(mode,mode==="tropes"?[...selTropes]:[]);
    }catch(e){setError("Case stalled — please try again.");}
    setLoading(false);
  };

  const searchMore=async()=>{
    if(!lastSearch.current) return;
    setLoadingMore(true);
    try{await runSearch(lastSearch.current,shownTitles,true,true);}
    catch{setError("Case stalled — please try again.");}
    setLoadingMore(false);
  };

  const saveProfile=p=>{
    const updated=profiles.find(x=>x.id===p.id)?profiles.map(x=>x.id===p.id?p:x):[...profiles,p];
    saveProfiles(updated);setActiveProfileId(p.id);setAlreadyRead(new Set(p.alreadyRead||[]));setEditing(null);
  };

  const deleteProfile=id=>{
    saveProfiles(profiles.filter(p=>p.id!==id));
    if(activeProfileId===id){setActiveProfileId(null);setAlreadyRead(new Set());}
    setEditing(null);
  };

  const loaded=bookCount>0;
  const modes=[{id:"similar",label:"Find Similar"},{id:"tropes",label:"By Trope"},{id:"freetext",label:"Describe It"}];

  return <div>
    {/* Header */}
    <div className="header">
      <div className="header-inner">
        <div className="logo-badge">
          <img src={LOGO_FILE} alt="Fletcher Library"/>
        </div>
        <div className="header-text">
          <div className="case-label">Fletcher Middle School Library</div>
          <h1 className="title">The Fletcher Files</h1>
          <p className="subtitle">Cross-reference the stacks. Find your next case.</p>
        </div>
      </div>
      <div className="header-meta">
        <span className="stamp">{loaded?`${bookCount.toLocaleString()} volumes on record`:"Loading the archive…"}</span>
        <button className={`ledger-btn${showAnalytics?" active":""}`} onClick={()=>{setShowAnalytics(p=>!p);setEditing(null);}}>
          {showAnalytics?"Close Ledger":"The Ledger"}
        </button>
      </div>
    </div>

    {showAnalytics&&<AnalyticsPanel analytics={analytics}/>}

    {!loaded&&!loadError&&<p className="empty-msg" style={{marginTop:"3rem"}}>Pulling the archive…</p>}
    {loadError&&<div style={{background:"#1a0a0a",border:"1px solid #8b404044",padding:"1rem",color:"#e07070",fontSize:14,marginTop:"2rem"}}>
      <strong>Could not load books_fiction.csv.</strong> Make sure the file is in your GitHub repo.
    </div>}

    {loaded&&<>
      {/* Case Files */}
      <div className="profile-bar">
        <div className="section-label">Case File</div>
        <div className="profile-pills">
          <button className={`pill${!activeProfileId?" active":""}`} onClick={()=>selectProfile(null)}>No File</button>
          {profiles.map(p=><div key={p.id} style={{display:"flex",alignItems:"center"}}>
            <button className={`pill${activeProfileId===p.id?" active-left":""}`} onClick={()=>selectProfile(p.id)}>
              {p.initials} <span style={{fontSize:10,opacity:.7}}>{p.grade}</span>
            </button>
            {activeProfileId===p.id&&<button className="pill-edit" onClick={()=>setEditing(editing?.id===p.id?null:p)}>✎</button>}
          </div>)}
          {profiles.length<10&&<button className="pill-add" onClick={()=>setEditing({initials:"",grade:"6th",notes:"",likedBooks:[],alreadyRead:[]})}>+</button>}
        </div>
        {activeProfile?.notes&&<p className="profile-note">On file: {activeProfile.notes}</p>}
      </div>

      {editing&&<ProfileEditor profile={editing} books={books} onSave={saveProfile} onDelete={deleteProfile} onCancel={()=>setEditing(null)}/>}

      {!editing&&<>
        <div className="ornament">— ✦ —</div>

        <div className="tabs">
          {modes.map(m=><button key={m.id} className={`tab${mode===m.id?" active":""}`} onClick={()=>switchMode(m.id)}>{m.label}</button>)}
        </div>

        {mode==="similar"&&<div className="input-wrap" style={{position:"relative"}}>
          <div className="section-label">Book title</div>
          <input className="main-input" value={query} onChange={e=>onQueryChange(e.target.value)} placeholder="Start typing a title…"/>
          {suggestions.length>0&&<div className="dropdown">
            {suggestions.map((b,i)=><div key={i} className="dropdown-item" onClick={()=>{setRefBook(b);setQuery(b.title);setSuggestions([]);}}>
              <span className="dropdown-title">{b.title}</span>
              <span className="dropdown-author">{b.author}</span>
            </div>)}
          </div>}
        </div>}

        {mode==="freetext"&&<div className="input-wrap">
          <div className="section-label">Describe the case</div>
          <textarea className="main-textarea" value={query} onChange={e=>setQuery(e.target.value)} rows={3}
            placeholder='e.g. "A fantasy where the character has powers and solves a murder mystery"'/>
        </div>}

        {mode==="tropes"&&<div className="input-wrap">
          <p className="trope-hint">Click once to select · click again to mark as must-have (★)</p>
          {CATS.map(cat=><div key={cat} className="trope-section">
            <div className="trope-cat">{cat}</div>
            <div className="trope-chips">
              {TROPES.filter(t=>t.cat===cat).map(t=>{
                const on=selTropes.has(t.id),isPrio=priorityTrope===t.id;
                return <button key={t.id} onClick={()=>toggleTrope(t.id)} className={`trope-chip${isPrio?" priority":on?" selected":""}`}>
                  {isPrio?"★ ":""}{t.label}
                </button>;
              })}
            </div>
          </div>)}
        </div>}

        <div className="input-wrap">
          <div className="section-label">Already read</div>
          <BookSearch books={books} exclude={alreadyRead} onSelect={b=>setAlreadyRead(prev=>new Set([...prev,b.title]))} placeholder="Add a book to exclude…"/>
          <ChipList items={[...alreadyRead]} onRemove={t=>setAlreadyRead(prev=>{const n=new Set(prev);n.delete(t);return n;})}/>
        </div>

        {activeProfile?.likedBooks?.length>0&&<div className="liked-banner">
          <strong>❤ Preferred reading — influencing results: </strong>
          <span>{activeProfile.likedBooks.join(", ")}</span>
        </div>}

        {error&&<p className="error-msg">{error}</p>}

        {loading&&<TypewriterLoading text="Cross-referencing the stacks…"/>}
        {loadingMore&&<TypewriterLoading text="Pulling more files…"/>}

        {!loading&&<button className="ask-btn" onClick={search} disabled={loadingMore}>
          Open the Case
        </button>}

        {results&&results.length>0&&!loading&&<div>
          <div className="results-header">
            <span className="results-title">Evidence</span>
            <div className="results-line"/>
            <span className="results-count">{results.length} volumes filed</span>
          </div>
          {results.map((b,i)=>{
            const isLiked=activeProfile?.likedBooks?.includes(b.title);
            return <div key={`${b.title}-${i}`} className="result-card" data-num={ROMAN[i]||i+1} style={{animationDelay:`${i*0.08}s`}}>
              <div className="result-inner">
                <CoverImg isbn={b.isbn}/>
                <div className="result-body">
                  <div className="result-title-row">
                    <span className="result-title">{b.title}</span>
                    {activeProfile&&<button className="heart-btn" onClick={()=>toggleHeart(b.title)} style={{color:isLiked?"#e05030":"var(--border)"}}>
                      {isLiked?"♥":"♡"}
                    </button>}
                  </div>
                  <div className="result-meta">
                    {b.author}{b.series&&<span className="result-series">· {b.series}</span>}
                  </div>
                  <TypewriterText text={b.reason||""}/>
                </div>
              </div>
              <NoteField title={b.title}/>
            </div>;
          })}
          {!loadingMore&&<button className="more-btn" onClick={searchMore}>Pull More Files</button>}
        </div>}

        {results&&results.length===0&&!loading&&<p className="empty-msg">No evidence found — reopen the case.</p>}
      </>}
    </>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
