const tokenize = t => (t||"").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(w=>w.length>2&&!STOP.has(w));
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

// ─── SEARCH LOGIC ─────────────────────────────────────────────────────────────
function getCandidates(books,kws,priorityKws=[],likedKws=[],n=70,excl=null,alreadyRead=new Set(),shown=new Set(),doShuffle=false){
  const kSet=new Set(kws),pSet=new Set(priorityKws),lSet=new Set(likedKws);
  let pool=books.filter(b=>b.title!==excl&&!alreadyRead.has(b.title)&&!shown.has(b.title));
  let scored=pool.map(b=>{
    const toks=new Set(tokenize(`${b.title} ${b.subjects} ${b.summary}`));
    return {...b,_s:[...kSet].filter(k=>toks.has(k)).length+[...pSet].filter(k=>toks.has(k)).length*3+[...lSet].filter(k=>toks.has(k)).length*2};
  }).filter(b=>b._s>0);
  if(!scored.length) scored=pool;
  scored=doShuffle?shuffle(scored):scored.sort((a,b)=>b._s-a._s);
  return scored.slice(0,n);
}

async function callClaude(candidates,ctx,excluded=[],priorityLabel=null,likedTitles=[]){
  const exclNote=excluded.length?`\n\nDo NOT recommend: ${excluded.join(", ")}`:"";
  const prioNote=priorityLabel?`\n\nMust-have element: "${priorityLabel}" — every pick MUST clearly feature this.`:"";
  const likedNote=likedTitles.length?`\n\nThis student has loved: ${likedTitles.join(", ")}. Weight toward similar feel.`:"";
  const list=candidates.map((b,i)=>`${i+1}. "${b.title}" by ${b.author}\n   ${(b.summary||"").slice(0,200)}`).join("\n\n");
  const res=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({      model:"claude-sonnet-4-6",max_tokens:1000,
      system:"You are a school librarian recommending middle school and YA fiction. Return only valid JSON arrays, no markdown.",
      messages:[{role:"user",content:`${ctx}${prioNote}${likedNote}${exclNote}\n\nChoose 6 best matches:\n\n${list}\n\nReturn ONLY: [{"title":"...","author":"...","reason":"1-2 sentence explanation"}]`}]})});
  const data=await res.json();
  return JSON.parse((data.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
}

function NoteField({title}){

}

function BookSearch({books,exclude,onSelect,placeholder="Type a title…"}){
  const [inp,setInp]=React.useState("");
  const [sugg,setSugg]=React.useState([]);
  const onChange=val=>{setInp(val);if(val.length>1)setSugg(books.filter(b=>(b.title||"").toLowerCase().includes(val.toLowerCase())&&!exclude.has(b.title)).slice(0,5));else setSugg([]);};
  const pick=b=>{onSelect(b);setInp("");setSugg([]);};
  return(
    <div style={{position:"relative"}}>
      <input value={inp} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:"7px 11px",fontSize:13,border:`1px solid ${G}44`,borderRadius:6,background:"#fff",color:G,outline:"none"}}/>
      {sugg.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:30,background:"#fff",border:`1px solid ${G}44`,borderRadius:6,marginTop:2,boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
        {sugg.map((b,i)=><div key={i} onClick={()=>pick(b)}
          style={{padding:"7px 11px",fontSize:13,cursor:"pointer",borderBottom:i<sugg.length-1?`1px solid ${G}14`:"none",display:"flex",justifyContent:"space-between"}}
          onMouseEnter={e=>e.currentTarget.style.background=GL} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
          <span style={{color:G,fontWeight:500}}>{b.title}</span>
          <span style={{color:GA,fontSize:12}}>{b.author}</span>
        </div>)}
      </div>}
    </div>
  );
}

function App(){
  const [books,setBooks]=React.useState([]);
  const [bookCount,setBookCount]=React.useState(0);
  const [loadError,setLoadError]=React.useState(false);
  const [profiles,setProfiles]=React.useState(()=>lsLoad("profiles",[]));
  const [activeProfileId,setActiveProfileId]=React.useState(null);
  const [editing,setEditing]=React.useState(null);
  const [showAnalytics,setShowAnalytics]=React.useState(false);
  const [analytics,setAnalytics]=React.useState(()=>lsLoad("analytics",DEFAULT_ANALYTICS));
  const [mode,setMode]=React.useState("similar");
  const [query,setQuery]=React.useState("");
  const [selTropes,setSelTropes]=React.useState(new Set());
  const [priorityTrope,setPriorityTrope]=React.useState(null);
  const [alreadyRead,setAlreadyRead]=React.useState(new Set());
  const [results,setResults]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const [loadingMore,setLoadingMore]=React.useState(false);
  const [error,setError]=React.useState("");
  const [suggestions,setSuggestions]=React.useState([]);
  const [refBook,setRefBook]=React.useState(null);
  const [shownTitles,setShownTitles]=React.useState(new Set());
  const lastSearch=React.useRef(null);

  // Auto-load CSV from repo
  React.useEffect(()=>{
    fetch(CSV_FILE)
      .then(r=>{if(!r.ok)throw new Error("Not found");return r.text();})
      .then(text=>{
        Papa.parse(text,{header:true,skipEmptyLines:true,complete:r=>{setBooks(r.data);setBookCount(r.data.length);}});
      })
      .catch(()=>setLoadError(true));
  },[]);

  const saveProfiles=p=>{setProfiles(p);lsSave("profiles",p);};
  const saveAnalytics=a=>{setAnalytics(a);lsSave("analytics",a);};
  const activeProfile=profiles.find(p=>p.id===activeProfileId)||null;

  const selectProfile=id=>{
    setActiveProfileId(id);setEditing(null);setResults(null);setShownTitles(new Set());lastSearch.current=null;
    setAlreadyRead(id?new Set(profiles.find(p=>p.id===id)?.alreadyRead||[]):new Set());
  };

  const toggleHeart=title=>{
    if(!activeProfile) return;
    const liked=activeProfile.likedBooks||[];
    const updated=liked.includes(title)?liked.filter(t=>t!==title):[...liked,title];
    const newProfiles=profiles.map(p=>p.id===activeProfileId?{...p,likedBooks:updated}:p);
    saveProfiles(newProfiles);
  };

  const trackSearch=(m,tropes=[])=>{
    const a={...analytics,totalSearches:(analytics.totalSearches||0)+1,searchModes:{...analytics.searchModes,[m]:(analytics.searchModes[m]||0)+1},tropeSearches:{...analytics.tropeSearches}};
    tropes.forEach(t=>{a.tropeSearches[t]=(a.tropeSearches[t]||0)+1;});
    saveAnalytics(a);
  };

  const trackRecs=recs=>{
    const a={...analytics,recommendedBooks:{...analytics.recommendedBooks}};
    recs.forEach(b=>{a.recommendedBooks[b.title]=(a.recommendedBooks[b.title]||0)+1;});
    saveAnalytics(a);
  };

  const onQueryChange=val=>{
    setQuery(val);setRefBook(null);
    if(mode==="similar"&&val.length>1) setSuggestions(books.filter(b=>(b.title||"").toLowerCase().includes(val.toLowerCase())).slice(0,7));
    else setSuggestions([]);
  };

  const toggleTrope=id=>{
    setSelTropes(prev=>{
      const n=new Set(prev);
      if(!n.has(id)){n.add(id);}
      else if(priorityTrope!==id){setPriorityTrope(id);}
      else{n.delete(id);setPriorityTrope(null);}
      return n;
    });
  };

  const switchMode=m=>{setMode(m);setResults(null);setError("");setQuery("");setRefBook(null);setSuggestions([]);setSelTropes(new Set());setPriorityTrope(null);setShownTitles(new Set());lastSearch.current=null;};

  const getLikedKws=()=>{
    if(!activeProfile?.likedBooks?.length) return[];
    return tokenize(books.filter(b=>activeProfile.likedBooks.includes(b.title)).map(b=>`${b.subjects} ${b.summary}`).join(" "));
  };

  const buildParams=()=>{
    let kws=[],priorityKws=[],ctx="",excl=null,priorityLabel=null;
    if(mode==="similar"){
      const ref=refBook||books.find(b=>(b.title||"").toLowerCase()===query.toLowerCase());
      if(!ref) return null;
      kws=tokenize(`${ref.subjects} ${ref.summary}`);excl=ref.title;
      ctx=`A student loved "${ref.title}" by ${ref.author}.\n\nSummary: ${ref.summary}\n\nFind books with similar themes, characters, tone, and plot elements.`;
    } else if(mode==="tropes"){
      if(!selTropes.size) return null;
      const labels=TROPES.filter(t=>selTropes.has(t.id)).map(t=>t.label);
      kws=[...new Set(labels.flatMap(l=>{const id=TROPES.find(t=>t.label===l)?.id;return[...tokenize(l),...(TROPE_KEYWORDS[id]||[])];}))];
      if(priorityTrope){priorityKws=[...tokenize(TROPES.find(t=>t.id===priorityTrope)?.label||""),...(TROPE_KEYWORDS[priorityTrope]||[])];priorityLabel=TROPES.find(t=>t.id===priorityTrope)?.label;}
      ctx=`A student wants books with: ${labels.join(", ")}. Find the best matches.`;
    } else {
      if(!query.trim()) return null;
      kws=tokenize(query);
      ctx=`A student wants: "${query}". Find the best matches.`;
    }
    return{kws,priorityKws,ctx,excl,priorityLabel};
  };

  const runSearch=async(params,shown,doShuffle=false,isMore=false)=>{
    const{kws,priorityKws,ctx,excl,priorityLabel}=params;
    const cands=getCandidates(books,kws,priorityKws,getLikedKws(),70,excl,alreadyRead,shown,doShuffle);
    const recs=await callClaude(cands,ctx,[...alreadyRead,...shown],priorityLabel,activeProfile?.likedBooks||[]);
    const enriched=recs.map(r=>({...(books.find(b=>b.title===r.title&&b.author===r.author)||books.find(b=>b.title===r.title)||r),...r}));
    setShownTitles(new Set([...shown,...enriched.map(b=>b.title)]));
    isMore?setResults(prev=>[...(prev||[]),...enriched]):setResults(enriched);
    trackRecs(enriched);
  };

  const search=async()=>{
    setError("");setResults(null);setLoading(true);setShownTitles(new Set());lastSearch.current=null;
    try{
      const params=buildParams();
      if(!params){setError(mode==="similar"?"Select a title from the suggestions.":mode==="tropes"?"Select at least one trope.":"Describe what you're looking for.");setLoading(false);return;}
      lastSearch.current=params;
      await runSearch(params,new Set());
      trackSearch(mode,mode==="tropes"?[...selTropes]:[]);
    }catch{setError("Something went wrong — please try again.");}
    setLoading(false);
  };

  const searchMore=async()=>{
    if(!lastSearch.current) return;
    setLoadingMore(true);
    try{await runSearch(lastSearch.current,shownTitles,true,true);}
    catch{setError("Something went wrong — please try again.");}
    setLoadingMore(false);
  };

  const saveProfile=p=>{
    const updated=profiles.find(x=>x.id===p.id)?profiles.map(x=>x.id===p.id?p:x):[...profiles,p];
    saveProfiles(updated);setActiveProfileId(p.id);setAlreadyRead(new Set(p.alreadyRead||[]));setEditing(null);
  };

  const deleteProfile=id=>{
    saveProfiles(profiles.filter(p=>p.id!==id));
    if(activeProfileId===id){setActiveProfileId(null);setAlreadyRead(new Set());}
    setEditing(null);
  };

  const loaded=bookCount>0;
  const modes=[{id:"similar",label:"Find Similar"},{id:"tropes",label:"By Trope"},{id:"freetext",label:"Describe It"}];

  return(
    <div>
      {/* Header */}
      <div style={{borderBottom:`2px solid ${G}`,paddingBottom:12,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <h1 style={{fontFamily:"Georgia,serif",fontWeight:400,fontSize:24,color:G}}>Fletcher Library</h1>
          <p style={{fontSize:13,color:GA,fontStyle:"italic",marginTop:2}}>Book Recommendation Tool</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {loaded&&<span style={{fontSize:11,color:GA,letterSpacing:".04em",textTransform:"uppercase"}}>{bookCount.toLocaleString()} titles</span>}
          <button onClick={()=>{setShowAnalytics(p=>!p);setEditing(null);}} style={{padding:"5px 12px",fontSize:12,background:showAnalytics?G:"#fff",color:showAnalytics?"#fff":GA,border:`1px solid ${G}55`,borderRadius:6,cursor:"pointer"}}>
            {showAnalytics?"Hide analytics":"Analytics"}
          </button>
        </div>
      </div>

      {showAnalytics&&<AnalyticsPanel analytics={analytics}/>}

      {/* Loading state */}
      {!loaded&&!loadError&&<p style={{color:GA,fontStyle:"italic",fontSize:14}}>Loading catalog…</p>}
      {loadError&&<div style={{background:"#fdf0f0",border:"1px solid #e0b0b0",borderRadius:8,padding:"1rem",color:"#8b2e2e",fontSize:13}}>
        <strong>Could not load books_fiction.csv.</strong> Make sure the file is in the same folder as index.html in your GitHub repo.
      </div>}

      {loaded&&(
        <>
          {/* Profile bar */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:".07em",color:GA,marginBottom:7}}>Student profile</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
              <button onClick={()=>selectProfile(null)} style={{padding:"5px 13px",fontSize:12,borderRadius:20,border:`1px solid ${!activeProfileId?G:G+"44"}`,background:!activeProfileId?G:"#fff",color:!activeProfileId?"#fff":GA,cursor:"pointer"}}>
                No profile
              </button>
              {profiles.map(p=>(
                <div key={p.id} style={{display:"flex",alignItems:"center"}}>
                  <button onClick={()=>selectProfile(p.id)} style={{padding:"5px 13px",fontSize:12,fontWeight:500,borderRadius:activeProfileId===p.id?"20px 0 0 20px":"20px",border:`1px solid ${activeProfileId===p.id?G:G+"44"}`,borderRight:activeProfileId===p.id?"none":undefined,background:activeProfileId===p.id?G:"#fff",color:activeProfileId===p.id?"#fff":GA,cursor:"pointer"}}>
                    {p.initials} <span style={{fontSize:10,opacity:.7}}>{p.grade}</span>
                  </button>
                  {activeProfileId===p.id&&<button onClick={()=>setEditing(editing?.id===p.id?null:p)} style={{padding:"5px 8px",fontSize:12,borderRadius:"0 20px 20px 0",border:`1px solid ${G}`,borderLeft:"none",background:G,color:"#fff",cursor:"pointer"}}>✎</button>}
                </div>
              ))}
              {profiles.length<10&&<button onClick={()=>setEditing({initials:"",grade:"6th",notes:"",likedBooks:[],alreadyRead:[]})} style={{padding:"5px 11px",fontSize:14,borderRadius:20,border:`1px solid ${G}44`,background:"#fff",color:GA,cursor:"pointer",lineHeight:1}}>+</button>}
            </div>
            {activeProfile?.notes&&<p style={{margin:"7px 0 0",fontSize:12,color:GA,fontStyle:"italic"}}>Note: {activeProfile.notes}</p>}
          </div>

          {editing&&<ProfileEditor profile={editing} books={books} onSave={saveProfile} onDelete={deleteProfile} onCancel={()=>setEditing(null)}/>}

          {!editing&&(
            <>
              <div style={{display:"flex",borderBottom:`1px solid ${G}30`,marginBottom:18}}>
                {modes.map(m=><button key={m.id} onClick={()=>switchMode(m.id)} style={{padding:"7px 18px",fontSize:13,background:"none",border:"none",cursor:"pointer",color:mode===m.id?G:GA,fontWeight:mode===m.id?500:400,borderBottom:mode===m.id?`2px solid ${G}`:"2px solid transparent",marginBottom:-1}}>{m.label}</button>)}
              </div>

              {mode==="similar"&&(
                <div style={{position:"relative",marginBottom:14}}>
                  <label style={{display:"block",fontSize:11,textTransform:"uppercase",letterSpacing:".07em",color:GA,marginBottom:5}}>Book title</label>
                  <input value={query} onChange={e=>onQueryChange(e.target.value)} placeholder="Start typing a title…"
                    style={{width:"100%",padding:"9px 13px",fontSize:14,border:`1px solid ${G}55`,borderRadius:6,background:"#fff",color:G,outline:"none"}}/>
                  {suggestions.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,background:"#fff",border:`1px solid ${G}44`,borderRadius:6,marginTop:2,boxShadow:"0 4px 16px rgba(0,0,0,.08)"}}>
                    {suggestions.map((b,i)=><div key={i} onClick={()=>{setRefBook(b);setQuery(b.title);setSuggestions([]);}}
                      style={{padding:"8px 13px",fontSize:13,cursor:"pointer",borderBottom:i<suggestions.length-1?`1px solid ${G}18`:"none",display:"flex",justifyContent:"space-between",alignItems:"baseline"}}
                      onMouseEnter={e=>e.currentTarget.style.background=GL} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      <span style={{color:G,fontWeight:500}}>{b.title}</span>
                      <span style={{color:GA,fontSize:12,marginLeft:8}}>{b.author}</span>
                    </div>)}
                  </div>}
                </div>
              )}

              {mode==="freetext"&&(
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:11,textTransform:"uppercase",letterSpacing:".07em",color:GA,marginBottom:5}}>Describe what the student wants</label>
                  <textarea value={query} onChange={e=>setQuery(e.target.value)} placeholder='e.g. "A fantasy where the character has powers and solves a murder mystery"'
                    rows={3} style={{width:"100%",padding:"9px 13px",fontSize:14,border:`1px solid ${G}55`,borderRadius:6,background:"#fff",color:G,resize:"vertical",outline:"none"}}/>
                </div>
              )}

              {mode==="tropes"&&(
                <div style={{marginBottom:14}}>
                  <p style={{fontSize:12,color:GA,margin:"0 0 10px",fontStyle:"italic"}}>Click once to select · click again to mark as must-have (gold ★)</p>
                  {CATS.map(cat=>(
                    <div key={cat} style={{marginBottom:13}}>
                      <div style={{fontSize:10,fontWeight:500,textTransform:"uppercase",letterSpacing:".08em",color:GA,marginBottom:6}}>{cat}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {TROPES.filter(t=>t.cat===cat).map(t=>{
                          const on=selTropes.has(t.id),isPrio=priorityTrope===t.id;
                          return <button key={t.id} onClick={()=>toggleTrope(t.id)} style={{padding:"4px 11px",fontSize:12,borderRadius:20,cursor:"pointer",border:`1px solid ${isPrio?GOLD:on?G:G+"44"}`,background:isPrio?GOLD:on?G:"#fff",color:isPrio||on?"#fff":GA}}>
                            {isPrio?"★ ":""}{t.label}
                          </button>;
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:11,textTransform:"uppercase",letterSpacing:".07em",color:GA,marginBottom:5}}>Already read</label>
                <BookSearch books={books} exclude={alreadyRead} onSelect={b=>setAlreadyRead(prev=>new Set([...prev,b.title]))} placeholder="Add a book to exclude…"/>
                <ChipList items={[...alreadyRead]} onRemove={t=>setAlreadyRead(prev=>{const n=new Set(prev);n.delete(t);return n;})}/>
              </div>

              {activeProfile?.likedBooks?.length>0&&(
                <div style={{marginBottom:14,padding:"8px 12px",background:GL,borderRadius:6,border:`1px solid ${GOLD}44`}}>
                  <span style={{fontSize:12,color:GOLD,fontWeight:500}}>❤ Liked books influencing results: </span>
                  <span style={{fontSize:12,color:GA}}>{activeProfile.likedBooks.join(", ")}</span>
                </div>
              )}

              {error&&<p style={{fontSize:13,color:"#8b2e2e",marginBottom:12,fontStyle:"italic"}}>{error}</p>}

              <button onClick={search} disabled={loading||loadingMore} style={{padding:"9px 24px",fontSize:13,letterSpacing:".04em",textTransform:"uppercase",background:G,color:"#fff",border:"none",borderRadius:6,cursor:loading?"not-allowed":"pointer",opacity:loading?.65:1,fontWeight:500,marginBottom:22}}>
                {loading?"Searching the stacks…":"Find Books"}
              </button>

              {results&&results.length>0&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <span style={{fontFamily:"Georgia,serif",fontSize:15,color:G,fontStyle:"italic"}}>Recommendations</span>
                    <div style={{flex:1,borderTop:`1px solid ${G}22`}}/>
                    <span style={{fontSize:11,color:GA,textTransform:"uppercase",letterSpacing:".05em"}}>{results.length} titles</span>
                  </div>
                  {results.map((b,i)=>{
                    const isLiked=activeProfile?.likedBooks?.includes(b.title);
                    return(
                      <div key={`${b.title}-${i}`} style={{padding:"13px 0",borderBottom:i<results.length-1?`1px solid ${G}14`:"none"}}>
                        <div style={{display:"flex",gap:13}}>
                          <CoverImg isbn={b.isbn}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                              <div style={{fontWeight:500,fontSize:14,color:G,lineHeight:1.3}}>{b.title}</div>
                              {activeProfile&&<button onClick={()=>toggleHeart(b.title)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:isLiked?"#c0392b":`${G}55`,padding:0,flexShrink:0,lineHeight:1}}>{isLiked?"♥":"♡"}</button>}
                            </div>
                            <div style={{fontSize:12,color:GA,marginBottom:5}}>
                              {b.author}{b.series?<span style={{marginLeft:6,color:`${G}88`,fontStyle:"italic"}}>· {b.series}</span>:""}
                            </div>
                            <div style={{fontSize:13,color:GA,lineHeight:1.5,fontStyle:"italic",borderLeft:`2px solid ${G}33`,paddingLeft:8}}>{b.reason}</div>
                          </div>
                        </div>
                        <NoteField title={b.title}/>
                      </div>
                    );
                  })}
                  <div style={{textAlign:"center",marginTop:18}}>
                    <button onClick={searchMore} disabled={loading||loadingMore} style={{padding:"8px 22px",fontSize:13,background:"#fff",color:G,border:`1px solid ${G}88`,borderRadius:6,cursor:loadingMore?"not-allowed":"pointer",opacity:loadingMore?.65:1}}>
                      {loadingMore?"Finding more…":"Show more results"}
                    </button>
                  </div>
                </div>
              )}
              {results&&results.length===0&&<p style={{fontSize:13,color:GA,fontStyle:"italic"}}>No recommendations found — try different terms.</p>}
            </>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
